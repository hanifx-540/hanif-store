/* ── IMAGE UPLOAD VARS ── */
let selectedImageBase64=null;

function handleImageUpload(event){
  const file=event.target.files[0];
  if(!file)return;

  // Size check: 1MB limit
  const MAX_SIZE=1*1024*1024;
  document.getElementById('imgSizeWarn').classList.remove('on');

  if(file.size>MAX_SIZE){
    document.getElementById('imgSizeWarn').classList.add('on');
    event.target.value='';
    return;
  }

  const reader=new FileReader();
  reader.onload=function(e){
    // Compress image using canvas
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX_W=800,MAX_H=800;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX_W){h=Math.round(h*MAX_W/w);w=MAX_W;}}
      else{if(h>MAX_H){w=Math.round(w*MAX_H/h);h=MAX_H;}}
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      selectedImageBase64=canvas.toDataURL('image/jpeg',0.75);

      // Show preview
      const preview=document.getElementById('imgPreview');
      preview.src=selectedImageBase64;
      preview.classList.add('on');
      document.getElementById('imgPlaceholder').style.display='none';
      document.getElementById('imgUploadArea').classList.add('has-img');

      // Show info bar
      const info=document.getElementById('imgPreviewInfo');
      info.classList.add('on');
      document.getElementById('imgFileName').textContent=file.name+' (compressed)';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImage(){
  selectedImageBase64=null;
  document.getElementById('imgFileInput').value='';
  document.getElementById('imgPreview').classList.remove('on');
  document.getElementById('imgPreview').src='';
  document.getElementById('imgPlaceholder').style.display='block';
  document.getElementById('imgUploadArea').classList.remove('has-img');
  document.getElementById('imgPreviewInfo').classList.remove('on');
  document.getElementById('imgSizeWarn').classList.remove('on');
