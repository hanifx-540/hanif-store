<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Hanif Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">

  const firebaseConfig = {
    apiKey: "AIzaSyAkD1rKfDPKng-ssmYEfF4uJZDPI_4mYtk",
    authDomain: "hanifx-206c8.firebaseapp.com",
    databaseURL: "https://hanifx-206c8-default-rtdb.firebaseio.com",
    projectId: "hanifx-206c8",
    storageBucket: "hanifx-206c8.firebasestorage.app",
    messagingSenderId: "1050477389957",

<style>
:root{
  --bg:#07070f;--s1:#0f0f1c;--s2:#161626;--s3:#1e1e30;
  --a1:#f72585;--a2:#7209b7;--a3:#4cc9f0;--a4:#f8961e;--green:#06d6a0;
  --txt:#f0f0ff;--muted:#6a6a8a;--border:rgba(247,37,133,.18);--glow:rgba(247,37,133,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}

/* LOGIN */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
.login-box{
  background:var(--s1);border:1px solid var(--border);border-radius:28px;
  padding:44px 40px;width:100%;max-width:400px;position:relative;z-index:1;
  animation:fadeUp .5s both;
}
.login-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:3px;background:linear-gradient(120deg,var(--a1),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:32px}
.login-ico{text-align:center;font-size:52px;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
input,textarea,select{
  background:var(--s2);border:1px solid var(--border);border-radius:12px;
  color:var(--txt);padding:12px 15px;font-family:'DM Sans',sans-serif;
  font-size:14px;outline:none;transition:all .3s;width:100%;
}
input:focus,textarea:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(247,37,133,.12)}
textarea{resize:vertical;min-height:82px}
.btn-login{
  width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));
  border:none;color:#fff;padding:14px;border-radius:13px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .3s;margin-top:6px;letter-spacing:.5px;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 26px var(--glow)}
.login-err{color:var(--a1);font-size:13px;text-align:center;margin-top:10px;display:none}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ADMIN LAYOUT */
#adminPage{display:none}
.adm-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:50;
  transition:transform .3s;
}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sb-logo-txt{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
  letter-spacing:2px;background:linear-gradient(120deg,var(--a1),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.sb-link{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
  font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:all .25s;border:none;background:transparent;text-align:left;
}
.sb-link:hover{background:var(--s2);color:var(--txt)}
.sb-link.on{background:rgba(247,37,133,.12);color:var(--a1);border:1px solid rgba(247,37,133,.2)}
.sb-link .ico{font-size:17px;width:24px;text-align:center}
.sb-link .badge{margin-left:auto;background:var(--a1);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sb-bottom{padding:16px 12px;border-top:1px solid var(--border)}
.btn-logout{
  width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:12px;border:1px solid rgba(247,37,133,.25);background:transparent;
  color:var(--a1);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
  transition:all .25s;
}
.btn-logout:hover{background:var(--a1);color:#fff}

/* MAIN */
.adm-main{margin-left:240px;flex:1;padding:28px 32px}
.adm-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.adm-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.adm-date{font-size:12px;color:var(--muted)}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.st-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;transition:all .3s}
.st-card:hover{border-color:var(--a1);transform:translateY(-3px)}
.st-n{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;
  background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.st-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

/* PANELS */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:none}
.panel.on{display:block}
.panel-hd{display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border)}
.panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.panel-body{padding:24px}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fgrid .full{grid-column:1/-1}
.ep{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.eo{width:40px;height:40px;border-radius:9px;font-size:20px;
  background:var(--s2);border:1.5px solid var(--border);
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.eo:hover{border-color:var(--a1);transform:scale(1.08)}
.eo.on{border-color:var(--a1);background:rgba(247,37,133,.15)}
.btn-add{
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;color:#fff;
  padding:13px 28px;border-radius:12px;font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:20px;
}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 22px var(--glow)}
.btn-add:disabled{opacity:.5;cursor:not-allowed}

/* PRODUCT ROWS */
.p-rows{display:flex;flex-direction:column;gap:10px}
.p-row{
  display:flex;align-items:center;gap:14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:14px;padding:13px 16px;transition:all .25s;
}
.p-row:hover{border-color:var(--a1)}
.p-ico{font-size:28px;flex-shrink:0}
.p-inf{flex:1}
.p-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.p-mt{font-size:11px;color:var(--muted);margin-top:2px}
.p-pr{font-family:'Syne',sans-serif;font-weight:800;color:var(--a1);font-size:16px;flex-shrink:0}
.btn-del{
  background:rgba(247,37,133,.1);border:1px solid rgba(247,37,133,.25);
  color:var(--a1);padding:7px 12px;border-radius:9px;font-size:12px;
  cursor:pointer;transition:all .25s;flex-shrink:0;
}
.btn-del:hover{background:var(--a1);color:#fff}

/* ORDER ROWS */
.o-row{
  background:var(--s2);border:1px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:10px;transition:all .25s;
}
.o-row:hover{border-color:var(--a1)}
.o-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.o-id{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.o-date{font-size:11px;color:var(--muted)}
.o-total{font-family:'Syne',sans-serif;font-weight:800;color:var(--a1);font-size:16px}
.o-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.o-field{font-size:12px}
.o-field span:first-child{color:var(--muted);display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.o-items{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.o-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.st-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;
  border-radius:40px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.st-pending{background:rgba(248,150,30,.15);color:var(--a4)}
.st-confirmed{background:rgba(76,201,240,.15);color:var(--a3)}
.st-delivered{background:rgba(6,214,160,.15);color:var(--green)}
.st-cancelled{background:rgba(247,37,133,.15);color:var(--a1)}
.btn-st{
  padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;border:1px solid var(--border);
  background:var(--s3);color:var(--txt);
}
.btn-st:hover{border-color:var(--a1);color:var(--a1)}
.btn-st.active-st{background:var(--a1);border-color:var(--a1);color:#fff}
.btn-del-order{
  margin-left:auto;background:rgba(247,37,133,.1);border:1px solid rgba(247,37,133,.2);
  color:var(--a1);padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;transition:all .2s;
}
.btn-del-order:hover{background:var(--a1);color:#fff}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.f-btn{padding:6px 14px;border-radius:40px;background:var(--s2);border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;transition:all .2s}
.f-btn:hover{border-color:var(--a1);color:var(--txt)}
.f-btn.on{background:var(--a1);border-color:var(--a1);color:#fff}

/* EMPTY */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state p:first-child{font-size:40px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;
  padding:11px 24px;border-radius:40px;font-size:13px;font-weight:500;
  z-index:500;opacity:0;transition:all .35s cubic-bezier(.175,.885,.32,1.275);
  pointer-events:none;white-space:nowrap;box-shadow:0 6px 22px var(--glow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFIRM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);
  z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.conf-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;
  padding:28px;width:100%;max-width:360px;text-align:center}
.conf-ico{font-size:44px;margin-bottom:12px}
.conf-ttl{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.conf-msg{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.conf-btns{display:flex;gap:10px;justify-content:center}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--txt);
  padding:10px 22px;border-radius:11px;cursor:pointer;transition:all .2s;font-size:13px}
.btn-cancel:hover{border-color:var(--a1)}
.btn-confirm{background:var(--a1);border:none;color:#fff;
  padding:10px 22px;border-radius:11px;cursor:pointer;transition:all .2s;font-size:13px;font-weight:700}
.btn-confirm:hover{background:#d4006e}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .adm-main{margin-left:0;padding:16px}
  .stat-row{grid-template-columns:1fr 1fr}
  .fgrid{grid-template-columns:1fr}
  .menu-toggle{display:flex!important}
}
.menu-toggle{
  display:none;position:fixed;top:16px;left:16px;z-index:60;
  width:40px;height:40px;border-radius:12px;background:var(--s1);
  border:1px solid var(--border);color:var(--txt);font-size:18px;
  cursor:pointer;align-items:center;justify-content:center;
}
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="confModal">
  <div class="conf-box">
    <div class="conf-ico">⚠️</div>
    <div class="conf-ttl" id="confTitle">নিশ্চিত করুন</div>
    <div class="conf-msg" id="confMsg">এই কাজটি কি করতে চান?</div>
    <div class="conf-btns">
      <button class="btn-cancel" onclick="closeConf()">বাতিল</button>
      <button class="btn-confirm" id="confOk">হ্যাঁ, করুন</button>
    </div>
  </div>
</div>

<!-- MENU TOGGLE (mobile) -->
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>

<!-- ═══ LOGIN PAGE ═══ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-ico">🔐</div>
    <div class="login-logo">HANIF STORE</div>
    <div class="login-sub">Admin Panel — শুধুমাত্র অনুমোদিত ব্যক্তি</div>
    <div class="fg"><label>Username</label><input id="lUser" type="text" placeholder="username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="lPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-login" onclick="doLogin()">প্রবেশ করুন →</button>
    <div class="login-err" id="loginErr">❌ ভুল username বা password!</div>
  </div>
</div>

<!-- ═══ ADMIN PAGE ═══ -->
<div id="adminPage">
  <div class="adm-layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-txt">HANIF STORE</div>
        <div class="sb-logo-sub">Admin Panel</div>
      </div>
      <div class="sb-nav">
        <button class="sb-link on" onclick="showPanel('dashboard',this)"><span class="ico">📊</span> Dashboard</button>
        <button class="sb-link" onclick="showPanel('products',this)"><span class="ico">📦</span> পণ্য যোগ করুন</button>
        <button class="sb-link" onclick="showPanel('manage',this)"><span class="ico">⚙️</span> পণ্য ব্যবস্থাপনা</button>
        <button class="sb-link" onclick="showPanel('orders',this)">
          <span class="ico">🧾</span> অর্ডারসমূহ
          <span class="badge" id="pendingBadge">0</span>
        </button>
      </div>
      <div class="sb-bottom">
        <button class="btn-logout" onclick="doLogout()">🚪 <span>লগআউট</span></button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="adm-main">
      <div class="adm-topbar">
        <div>
          <div class="adm-title" id="panelTitle">Dashboard</div>
          <div class="adm-date" id="dateStr"></div>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div class="panel on" id="pDashboard">
        <div class="stat-row">
          <div class="st-card"><div class="st-n" id="dProd">0</div><div class="st-l">মোট পণ্য</div></div>
          <div class="st-card"><div class="st-n" id="dOrders">0</div><div class="st-l">মোট অর্ডার</div></div>
          <div class="st-card"><div class="st-n" id="dPending">0</div><div class="st-l">অপেক্ষমান</div></div>
          <div class="st-card"><div class="st-n" id="dRevenue">৳০</div><div class="st-l">মোট আয়</div></div>
        </div>
        <div class="panel" style="display:block">
          <div class="panel-hd"><div class="panel-title">📋 সাম্প্রতিক অর্ডার</div></div>
          <div class="panel-body"><div id="recentOrders"></div></div>
        </div>
      </div>

      <!-- ADD PRODUCT -->
      <div class="panel" id="pProducts">
        <div class="panel-hd"><div class="panel-title">✦ নতুন পণ্য যোগ করুন</div></div>
        <div class="panel-body">
          <div class="fgrid">
            <div class="fg"><label>পণ্যের নাম</label><input id="pN" placeholder="যেমন: প্রিমিয়াম শার্ট"></div>
            <div class="fg"><label>ক্যাটাগরি</label><input id="pC" placeholder="যেমন: পোশাক"></div>
            <div class="fg"><label>মূল্য (৳)</label><input id="pP" type="number" placeholder="৯৯৯"></div>
            <div class="fg"><label>আসল মূল্য (৳) — ঐচ্ছিক</label><input id="pOP" type="number" placeholder="১৪৯৯"></div>
            <div class="fg full"><label>বিবরণ</label><textarea id="pD" placeholder="পণ্যের সংক্ষিপ্ত বিবরণ লিখুন…"></textarea></div>
            <div class="fg full"><label>ব্যাজ — ঐচ্ছিক (যেমন: HOT, NEW, SALE)</label><input id="pB" placeholder="NEW"></div>
            <div class="fg full">
              <label>ইমোজি / আইকন বেছে নিন</label>
              <div class="ep" id="epicker"></div>
              <input id="pE" placeholder="অথবা যেকোনো ইমোজি টাইপ করুন" style="margin-top:10px">
            </div>
          </div>
          <button class="btn-add" id="saveBtn" onclick="addProduct()">✦ Firebase-এ যোগ করুন</button>
        </div>
      </div>

      <!-- MANAGE PRODUCTS -->
      <div class="panel" id="pManage">
        <div class="panel-hd">
          <div class="panel-title">⚙️ পণ্য ব্যবস্থাপনা</div>
          <div id="prodCount" style="font-size:13px;color:var(--muted)"></div>
        </div>
        <div class="panel-body"><div class="p-rows" id="prodList"></div></div>
      </div>

      <!-- ORDERS -->
      <div class="panel" id="pOrders">
        <div class="panel-hd">
          <div class="panel-title">🧾 সকল অর্ডার</div>
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <button class="f-btn on" data-f="all" onclick="setOFilter('all',this)">সব</button>
            <button class="f-btn" data-f="pending" onclick="setOFilter('pending',this)">⏳ অপেক্ষমান</button>
            <button class="f-btn" data-f="confirmed" onclick="setOFilter('confirmed',this)">✅ নিশ্চিত</button>
            <button class="f-btn" data-f="delivered" onclick="setOFilter('delivered',this)">🎉 ডেলিভারি</button>
            <button class="f-btn" data-f="cancelled" onclick="setOFilter('cancelled',this)">❌ বাতিল</button>
          </div>
          <div id="orderList"></div>
        </div>
      </div>

    </div><!-- /adm-main -->
  </div>
</div>

<script>
/* ── AUTH ── */
const CREDS={user:'hanifx',pass:'habifx@#4253A'};
function doLogin(){
  const u=document.getElementById('lUser').value.trim();
  const p=document.getElementById('lPass').value;
  if(u===CREDS.user&&p===CREDS.pass){
    sessionStorage.setItem('hs_admin','1');
    document.getElementById('loginPage').style.display='none';
    document.getElementById('adminPage').style.display='block';
    initAdmin();
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('lPass').value='';
    setTimeout(()=>document.getElementById('loginErr').style.display='none',3000);
  }
}
document.getElementById('lPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('lUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lPass').focus()});
function doLogout(){sessionStorage.removeItem('hs_admin');location.reload()}
if(sessionStorage.getItem('hs_admin')==='1'){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('adminPage').style.display='block';
  document.addEventListener('fb-ready',initAdmin);
}

/* ── CANVAS ── */
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let pts=[];
  function init(){cv.width=innerWidth;cv.height=innerHeight;pts=[];for(let i=0;i<60;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.4+.3,o:Math.random()*.3+.05,c:['#f72585','#7209b7','#4cc9f0'][Math.floor(Math.random()*3)]})}
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(247,37,133,.025)';ctx.lineWidth=1;for(let x=0;x<cv.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke()}for(let y=0;y<cv.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke()}pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.o;ctx.fill();ctx.globalAlpha=1;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>cv.width)p.vx*=-1;if(p.y<0||p.y>cv.height)p.vy*=-1});requestAnimationFrame(draw)}
  init();draw();window.addEventListener('resize',init);
})();

/* ── TOAST ── */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600)}

/* ── CONFIRM MODAL ── */
let confCb=null;
function confirm2(title,msg,cb){
  document.getElementById('confTitle').textContent=title;
  document.getElementById('confMsg').textContent=msg;
  confCb=cb;document.getElementById('confModal').classList.add('on');
  document.getElementById('confOk').onclick=()=>{closeConf();cb()};
}
function closeConf(){document.getElementById('confModal').classList.remove('on')}

/* ── SIDEBAR ── */
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function showPanel(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sb-link').forEach(b=>b.classList.remove('on'));
  document.getElementById('p'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('on');
  btn.classList.add('on');
  const titles={dashboard:'Dashboard',products:'নতুন পণ্য যোগ করুন',manage:'পণ্য ব্যবস্থাপনা',orders:'সকল অর্ডার'};
  document.getElementById('panelTitle').textContent=titles[name]||name;
  if(name==='manage')renderManage();
  if(name==='orders')renderOrders();
  if(name==='dashboard')renderDashboard();
}

/* ── DATA ── */
let allP={},allO={},oFilter='all';
const EMOJIS=['👟','👕','👗','💍','⌚','📱','💻','🎧','🎮','🎒','🌺','🍫','☕','📚','🏋️','🎯','🎸','🧴','💎','🛍️','🕶️','🏠','🚗','🎁','🖼️'];
let selEmoji='📦';

function initAdmin(){
  document.getElementById('dateStr').textContent=new Date().toLocaleDateString('bn-BD',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  buildPicker();
  const{db,ref,onValue}=window._fb;
  onValue(ref(db,'products'),snap=>{allP={};if(snap.exists())snap.forEach(c=>{allP[c.key]={...c.val(),_id:c.key}});updateStats();if(document.getElementById('pManage').classList.contains('on'))renderManage()});
  onValue(ref(db,'orders'),snap=>{allO={};if(snap.exists())snap.forEach(c=>{allO[c.key]={...c.val(),_id:c.key}});updateStats();if(document.getElementById('pOrders').classList.contains('on'))renderOrders();if(document.getElementById('pDashboard').classList.contains('on'))renderDashboard()});
}

/* ── STATS ── */
function updateStats(){
  const prods=Object.keys(allP).length;
  const orders=Object.values(allO);
  const pending=orders.filter(o=>o.status==='pending').length;
  const rev=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  document.getElementById('dProd').textContent=prods;
  document.getElementById('dOrders').textContent=orders.length;
  document.getElementById('dPending').textContent=pending;
  document.getElementById('dRevenue').textContent='৳'+(rev>=1000?Math.round(rev/1000)+'K':rev.toLocaleString());
  document.getElementById('pendingBadge').textContent=pending;
}

/* ── DASHBOARD ── */
function renderDashboard(){
  const orders=Object.values(allO).sort((a,b)=>b._id.localeCompare(a._id)).slice(0,5);
  const el=document.getElementById('recentOrders');
  if(!orders.length){el.innerHTML='<div class="empty-state"><p>📋</p><p>এখনো কোনো অর্ডার নেই।</p></div>';return}
  el.innerHTML=orders.map(o=>orderRowHTML(o,true)).join('');
}

/* ── EMOJI PICKER ── */
function buildPicker(){
  const ep=document.getElementById('epicker');ep.innerHTML='';
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');b.className='eo'+(e===selEmoji?' on':'');
    b.textContent=e;b.onclick=()=>{selEmoji=e;document.getElementById('pE').value=e;document.querySelectorAll('.eo').forEach(x=>x.classList.remove('on'));b.classList.add('on')};
    ep.appendChild(b);
  });
}

/* ── ADD PRODUCT ── */
async function addProduct(){
  const name=document.getElementById('pN').value.trim();
  const price=parseFloat(document.getElementById('pP').value);
  if(!name||!price){toast('⚠️ নাম ও মূল্য আবশ্যক!');return}
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='সংরক্ষণ হচ্ছে…';
  const{db,ref,push}=window._fb;
  const prod={
    name,price,
    emoji:document.getElementById('pE').value||selEmoji,
    category:document.getElementById('pC').value.trim()||'সাধারণ',
    desc:document.getElementById('pD').value.trim()||'',
    origPrice:parseFloat(document.getElementById('pOP').value)||null,
    badge:document.getElementById('pB').value.trim()||null,
    createdAt:new Date().toLocaleDateString('bn-BD')
  };
  try{
    await push(ref(db,'products'),prod);
    toast('✦ পণ্য সফলভাবে যোগ হয়েছে!');
    ['pN','pP','pC','pD','pOP','pB','pE'].forEach(id=>document.getElementById(id).value='');
  }catch(e){toast('❌ সমস্যা হয়েছে!')}
  btn.disabled=false;btn.textContent='✦ Firebase-এ যোগ করুন';
}

/* ── MANAGE PRODUCTS ── */
function renderManage(){
  const list=Object.values(allP);
  document.getElementById('prodCount').textContent=`মোট ${list.length}টি পণ্য`;
  document.getElementById('prodList').innerHTML=list.length
    ?list.map(p=>`
      <div class="p-row">
        <div class="p-ico">${p.emoji||'📦'}</div>
        <div class="p-inf">
          <div class="p-nm">${p.name}</div>
          <div class="p-mt">${p.category} · ${p.createdAt||'—'} ${p.badge?`· <span style="color:var(--a1)">${p.badge}</span>`:''}</div>
        </div>
        <div class="p-pr">৳${Number(p.price).toLocaleString()}</div>
        <button class="btn-del" onclick="delProduct('${p._id}','${p.name}')">মুছুন</button>
      </div>
    `).join('')
    :'<div class="empty-state"><p>📦</p><p>কোনো পণ্য নেই।</p></div>';
}

async function delProduct(id,name){
  confirm2('পণ্য মুছুন',`"${name}" পণ্যটি সবার জন্য মুছে যাবে। নিশ্চিত?`,async()=>{
    const{db,ref,remove}=window._fb;
    try{await remove(ref(db,'products/'+id));toast('🗑️ পণ্য মুছে ফেলা হয়েছে।')}
    catch(e){toast('❌ সমস্যা হয়েছে!')}
  });
}

/* ── ORDERS ── */
const stMap={
  pending:{cls:'st-pending',txt:'⏳ অপেক্ষমান'},
  confirmed:{cls:'st-confirmed',txt:'✅ নিশ্চিত'},
  delivered:{cls:'st-delivered',txt:'🎉 ডেলিভারি হয়েছে'},
  cancelled:{cls:'st-cancelled',txt:'❌ বাতিল'}
};

function setOFilter(f,btn){
  oFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderOrders();
}

function renderOrders(){
  let orders=Object.values(allO).sort((a,b)=>b._id.localeCompare(a._id));
  if(oFilter!=='all')orders=orders.filter(o=>o.status===oFilter);
  document.getElementById('orderList').innerHTML=orders.length
    ?orders.map(o=>orderRowHTML(o,false)).join('')
    :'<div class="empty-state"><p>📋</p><p>কোনো অর্ডার নেই।</p></div>';
}

function orderRowHTML(o,mini){
  const st=stMap[o.status||'pending'];
  const statuses=['pending','confirmed','delivered','cancelled'];
  return `
    <div class="o-row" id="orow-${o._id}">
      <div class="o-top">
        <div>
          <div class="o-id">${o.orderId||'—'}</div>
          <div class="o-date">${o.date||'—'}</div>
        </div>
        <div class="st-badge ${st.cls}">${st.txt}</div>
        <div class="o-total">৳${(o.total||0).toLocaleString()}</div>
      </div>
      ${!mini?`
      <div class="o-info">
        <div class="o-field"><span>নাম</span>${o.name||'—'}</div>
        <div class="o-field"><span>ফোন</span>${o.phone||'—'}</div>
        <div class="o-field"><span>পেমেন্ট</span>${o.payMethod==='bkash'?'bKash':'Cash on Delivery'}</div>
        ${o.txn&&o.txn!=='N/A'?`<div class="o-field"><span>TXN ID</span>${o.txn}</div>`:''}
      </div>
      <div class="o-field" style="margin-bottom:6px"><span style="color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase">ঠিকানা</span><br>${o.address||'—'}</div>
      <div class="o-items">📦 ${(o.items||[]).map(i=>`${i.emoji||''} ${i.name} ×${i.qty}`).join(' · ')}</div>
      <div class="o-actions">
        ${statuses.map(s=>`<button class="btn-st${(o.status||'pending')===s?' active-st':''}" onclick="updateStatus('${o._id}','${s}')">${stMap[s].txt}</button>`).join('')}
        <button class="btn-del-order" onclick="delOrder('${o._id}','${o.orderId}')">🗑️</button>
      </div>`:''}
    </div>
  `;
}

async function updateStatus(id,status){
  const{db,ref,update}=window._fb;
  try{
    await update(ref(db,'orders/'+id),{status});
    toast('✅ স্ট্যাটাস আপডেট হয়েছে!');
  }catch(e){toast('❌ সমস্যা হয়েছে!')}
}

async function delOrder(id,orderId){
  confirm2('অর্ডার মুছুন',`অর্ডার ${orderId} মুছে ফেলবেন?`,async()=>{
    const{db,ref,remove}=window._fb;
    try{await remove(ref(db,'orders/'+id));toast('🗑️ অর্ডার মুছে ফেলা হয়েছে।')}
    catch(e){toast('❌ সমস্যা হয়েছে!')}
  });
}

/* init if already logged in */
if(sessionStorage.getItem('hs_admin')==='1'){
  if(window._fbReady)initAdmin();
  else document.addEventListener('fb-ready',initAdmin);
}
</script>
